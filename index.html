<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="scanline"></div>
  <div class="grid-bg"></div>

  <div class="dashboard">

    <!-- TOP ROW: Clock + Weather -->
    <div class="top-row">

      <!-- CLOCK -->
      <div class="panel clock-panel">
        <div class="panel-label">LOCAL TIME</div>
        <div class="clock-time" id="clock-time">00:00:00</div>
        <div class="clock-date" id="clock-date">MONDAY · JAN 1 · 2025</div>
      </div>

      <!-- WEATHER -->
      <div class="panel weather-panel">
        <div class="panel-label">BALLSTON, ARLINGTON, VA</div>
        <div class="weather-main" id="weather-main">
          <div class="weather-now">
            <div class="weather-icon" id="weather-icon">⛅</div>
            <div class="weather-temp" id="weather-temp">--°</div>
            <div class="weather-desc" id="weather-desc">Loading...</div>
          </div>
          <div class="weather-details" id="weather-details">
            <div class="weather-detail"><span class="detail-label">FEELS</span><span class="detail-val" id="feels-like">--°</span></div>
            <div class="weather-detail"><span class="detail-label">HUMIDITY</span><span class="detail-val" id="humidity">--%</span></div>
            <div class="weather-detail"><span class="detail-label">WIND</span><span class="detail-val" id="wind">-- km/h</span></div>
            <div class="weather-detail"><span class="detail-label">UV INDEX</span><span class="detail-val" id="uv">--</span></div>
          </div>
        </div>
        <!-- Hourly forecast -->
        <div class="hourly-forecast" id="hourly-forecast">
          <!-- Populated by JS -->
        </div>
      </div>

    </div>

    <!-- BOTTOM ROW: Metro + Sun/Air -->
    <div class="bottom-row">

      <!-- METRO BOARD -->
      <div class="panel metro-panel">
        <div class="panel-label">WMATA · <span id="metro-station-name">SILVER SPRING</span></div>
        <div class="metro-board" id="metro-board">
          <div class="metro-loading">
            <div class="led-dot"></div>
            <div class="led-dot"></div>
            <div class="led-dot"></div>
            <span>AWAITING SIGNAL</span>
          </div>
        </div>
        <div class="metro-updated">LAST UPDATED: <span id="metro-time">--:--</span></div>
      </div>

      <!-- RIGHT COLUMN: Sun + Air Quality -->
      <div class="side-panels">

        <div class="panel sun-panel">
          <div class="panel-label">SUN</div>
          <div class="sun-row">
            <div class="sun-item">
              <div class="sun-icon rise">▲</div>
              <div class="sun-label">RISE</div>
              <div class="sun-time" id="sunrise">--:--</div>
            </div>
            <div class="sun-arc" id="sun-arc-wrap">
              <svg viewBox="0 0 120 60" class="arc-svg">
                <path d="M10,55 Q60,-10 110,55" fill="none" stroke="#2a2a2a" stroke-width="2"/>
                <path d="M10,55 Q60,-10 110,55" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="200" stroke-dashoffset="200" id="arc-progress" class="arc-fill"/>
                <circle id="sun-dot" cx="10" cy="55" r="5" fill="#f59e0b"/>
              </svg>
            </div>
            <div class="sun-item">
              <div class="sun-icon set">▼</div>
              <div class="sun-label">SET</div>
              <div class="sun-time" id="sunset">--:--</div>
            </div>
          </div>
        </div>

        <div class="panel air-panel">
          <div class="panel-label">AIR QUALITY · AQI</div>
          <div class="aqi-display">
            <div class="aqi-number" id="aqi-number">--</div>
            <div class="aqi-bar-wrap">
              <div class="aqi-bar">
                <div class="aqi-fill" id="aqi-fill"></div>
                <div class="aqi-marker" id="aqi-marker"></div>
              </div>
              <div class="aqi-labels">
                <span>GOOD</span><span>MOD</span><span>USG</span><span>UNHLT</span><span>HAZRD</span>
              </div>
            </div>
            <div class="aqi-status" id="aqi-status">LOADING...</div>
          </div>
        </div>

      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
